<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>A.E.R.B.P // disg-crypto</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --aero-blue: #1a6bbc;
            --glow: 0 0 15px rgba(61, 174, 233, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #1a3a5f 0%, #050a14 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #e8f4ff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* THE GLASS ENGINE */
        .aero-window {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }

        .aero-window::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        /* AUTH SCREEN */
        #authScreen {
            position: fixed; inset: 0; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6);
        }

        .auth-card {
            width: 400px; padding: 40px; border-radius: 15px;
            text-align: center;
        }

        .logo-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px; font-weight: 900; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 180, 255, 0.8);
            margin-bottom: 30px;
        }

        .aero-input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px; color: white;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
        }

        .aero-btn {
            width: 100%; padding: 12px; border-radius: 8px;
            background: linear-gradient(180deg, #3daee9 0%, #1a6bbc 100%);
            border: 1px solid #78b4ff; color: white;
            font-weight: bold; text-transform: uppercase;
            box-shadow: var(--glow); transition: 0.3s;
            cursor: pointer;
        }

        .aero-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* NAVIGATION */
        .sidebar {
            width: 80px; height: 100vh; position: fixed; left: 0;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; gap: 20px; z-index: 10;
        }

        .nav-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .nav-icon:hover {
            background: var(--glass);
            border-color: var(--glass-border);
            box-shadow: var(--glow);
        }

        /* CONTENT */
        .main-content {
            margin-left: 80px; padding: 40px;
            height: 100vh; overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tile {
            height: 250px; border-radius: 12px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile:hover { transform: translateY(-10px) rotateX(5deg); }

        .status-text { font-size: 10px; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card aero-window">
            <div class="logo-glow">A.E.R.B.P</div>
            <div id="status" class="status-text">SYSTEM_READY</div>
            <input type="text" id="email" class="aero-input" placeholder="ACCESS_ID@AERBP">
            <input type="password" id="pass" class="aero-input" placeholder="SECURE_KEY">
            <button class="aero-btn" id="loginBtn">Initialize Link</button>
            <p id="err" style="font-size: 11px; margin-top: 15px; color: #ff6b6b; font-family: 'Share Tech Mono';"></p>
        </div>
    </div>

    <nav class="sidebar aero-window">
        <div class="nav-icon">📁</div>
        <div class="nav-icon">🌐</div>
        <div class="nav-icon">⚙️</div>
        <div class="nav-icon" style="margin-top: auto; margin-bottom: 20px;">👤</div>
    </nav>

    <main class="main-content">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 20px; letter-spacing: 2px;">SYSTEM_MANIFEST</h2>
        <div class="grid">
            <div class="tile aero-window"></div>
            <div class="tile aero-window"></div>
            <div class="tile aero-window"></div>
            <div class="tile aero-window"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATXxHT38WrUbLIcIceg-OpNwuvXlA2bTU",
            authDomain: "aerbp-82898.firebaseapp.com",
            projectId: "aerbp-82898",
            storageBucket: "aerbp-82898.firebasestorage.app",
            messagingSenderId: "900180834282",
            appId: "1:900180834282:web:c93a49607bd74bad58a493",
            measurementId: "G-C16DWJLJTH"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const statusEl = document.getElementById('status');

        console.log("Aero Engine Active.");

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const err = document.getElementById('err');

            if(!email || !pass) {
                err.innerText = "ERROR: NULL_CREDENTIALS";
                return;
            }

            try {
                err.innerText = "CONNECTING...";
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('authScreen').style.fadeOut = 'slow';
                document.getElementById('authScreen').style.display = 'none';
            } catch (e) {
                err.innerText = "LINK_FAILURE: " + e.message;
            }
        };
    </script>
</body>
</html>
